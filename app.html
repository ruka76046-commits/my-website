<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学習時間グラフ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .chart-container {
      position: relative;
      margin-bottom: 30px;
    }
    .form-group {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
    input, select, button {
      padding: 8px 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>1週間学習時間グラフ</h1>

  <div class="chart-container">
    <canvas id="myChart"></canvas>
  </div>

<div class="form-group">
    <label for="day-select">曜日:</label>
    <select id="day-select">
      <option value="0">月曜日</option>
      <option value="1">火曜日</option>
      <option value="2">水曜日</option>
      <option value="3">木曜日</option>
      <option value="4">金曜日</option>
      <option value="5">土曜日</option>
      <option value="6">日曜日</option>
    </select>

    <label for="hours-input">時間(時間):</label>
    <input type="number" id="hours-input" min="0" max="24" value="2" />

    <button id="update-btn">データを更新</button>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
